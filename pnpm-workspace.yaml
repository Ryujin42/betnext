packages:
  - 'apps/*'
  - 'libs/*'
allowBuilds:
  # @scarf/scarf = télémétrie analytics (tirée par @nestjs/swagger), inutile.
  '@scarf/scarf': false
  argon2: true
  esbuild: true
  msgpackr-extract: false
  nx: true
  # winston-loki utilise le push JSON de Loki (pas protobuf) → build inutile.
  protobufjs: false
