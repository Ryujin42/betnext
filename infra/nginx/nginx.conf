# nginx — reverse proxy / load balancer devant l'api-gateway (Lot 12 — T12.1).
#
# L'api-gateway est répliqué (`deploy.replicas`). On résout son nom à l'exécution
# via le DNS interne Docker (127.0.0.11) pour répartir la charge en round-robin
# sur toutes les instances. L'en-tête `X-Upstream-Addr` expose l'instance ayant
# répondu (démonstration de la répartition). Le bloc `Upgrade`/`Connection`
# permet le passage des WebSocket Socket.IO (cotes live, T9.3 / T12.2).
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # DNS embarqué Docker : ré-résolution périodique → suit les réplicas.
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Upstream-Addr $upstream_addr always;

    location / {
      # Hôte via variable → nginx utilise le resolver à chaque requête
      # (sinon il fige une seule IP au démarrage et ne répartit pas).
      set $gateway api-gateway;
      proxy_pass http://$gateway:3000$request_uri;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket (Socket.IO)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }
  }
}
