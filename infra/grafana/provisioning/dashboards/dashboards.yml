# Provider de dashboards : charge les JSON de /var/lib/grafana/dashboards (T11.2).
apiVersion: 1

providers:
  - name: BetNext
    orgId: 1
    folder: BetNext
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
