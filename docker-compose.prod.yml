# ─────────────────────────────────────────────────────────────────────────
# ÉBAUCHE production — démontre le scaling horizontal (cf. Lot 12).
# Les services applicatifs (stateless) sont répliqués derrière nginx ;
# PostgreSQL et Redis restent des points centraux (Redis Sentinel/Cluster
# en vrai prod). Les `build:` ci-dessous seront branchés quand les services
# auront leur Dockerfile (lots ultérieurs).
# ─────────────────────────────────────────────────────────────────────────
services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2 # plusieurs instances derrière nginx

  betting-service:
    build:
      context: .
      dockerfile: apps/betting-service/Dockerfile
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 3 # service à fort trafic

  odds-engine:
    build:
      context: .
      dockerfile: apps/odds-engine/Dockerfile
    depends_on:
      - redis
    deploy:
      replicas: 2 # workers de recalcul des cotes

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

volumes:
  pgdata:
  redisdata:
