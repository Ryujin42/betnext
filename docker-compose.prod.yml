# ─────────────────────────────────────────────────────────────────────────
# Production — démontre le scaling horizontal (Lot 12 — T12.1).
#
# Les services applicatifs sont **stateless** (sessions/refresh tokens en BDD,
# état temps réel partagé via Redis — cf. T12.2) → réplicables derrière nginx.
# PostgreSQL et Redis restent les points centraux (Redis Sentinel/Cluster en
# vraie prod). Tous les services se construisent depuis le **Dockerfile
# générique** `infra/docker/service.Dockerfile`, paramétré par l'ARG `APP`.
#
#   docker compose -f docker-compose.prod.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────
x-service-build: &service-build
  context: .
  dockerfile: infra/docker/service.Dockerfile

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgresql://betnext_app:app_pwd@postgres:5432/betnext?schema=betnext}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  EVENT_BUS_DRIVER: redis
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  LOKI_URL: ${LOKI_URL:-}

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  api-gateway:
    build:
      <<: *service-build
      args:
        APP: api-gateway
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2 # plusieurs instances derrière nginx

  betting-service:
    build:
      <<: *service-build
      args:
        APP: betting-service
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 3 # service à fort trafic

  odds-engine:
    build:
      <<: *service-build
      args:
        APP: odds-engine
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2 # workers de recalcul des cotes

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${NGINX_PORT:-8080}:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

volumes:
  pgdata:
  redisdata:
